name: OANDA Strategy Optimization

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai mcp oandapyV20 backtrader pandas

      - name: Run OANDA optimization
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          LLM_MODEL: deepseek-ai/deepseek-v4-flash
          GITHUB_GIST_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          OANDA_API_KEY: ${{ secrets.OANDA_API_KEY }}
          OANDA_ENV: practice
          MAX_INSTRUMENTS_PER_RUN: 3
        run: python optimize_strategies1.py
