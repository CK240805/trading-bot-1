name: Pre‑Trading Optimization

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai mcp requests oandapyV20 six

      - name: Run optimization
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-ai/deepseek-v4-flash' }}
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL || 'https://mcp.trader.dev/sse' }}
          TRADERDEV_API_KEY: ${{ secrets.TRADERDEV_API_KEY }}
          GITHUB_GIST_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          OANDA_API_KEY: ${{ secrets.OANDA_API_KEY }}
          OANDA_ENV: practice
        run: python optimize_strategies.py
